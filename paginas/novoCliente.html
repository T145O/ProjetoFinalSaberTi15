<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP</title>
    <link rel="stylesheet" href="../style/novoCliente.css">
</head>

<body>
    <a href="javascript:history.back()" class="botaoVoltar">Voltar</a>
    <main class="pageContent">
        <section class="card">
            <form id="novoClienteForm" class="form">
                <h1>Cadastrar um novo cliente</h1>
                <div class="fieldGroup">
                    <label for="nome">Nome do cliente</label>
                    <input type="text" placeholder="Nome" id="nome">
                    <label for="tipo">Tipo do cliente</label>
                    <div style="display: flex; justify-content: center; padding-top: 10px; padding-bottom: 5px;">
                        <label>
                            <input type="radio" name="tipoCliente" value="F">
                            Pessoa física
                        </label>
                        <label>
                            <input type="radio" name="tipoCliente" value="J">
                            Pessoa jurídica
                        </label>
                    </div>
                    <label for="cpfCnpj">CPF/CNPJ</label>
                    <input type="text" maxlength="18" placeholder="CPF/CNPJ" id="cpfCnpj">
                </div>
                <button type="submit" id="enviar">Cadastrar</button>
            </form>
        </section>
    </main>
</body>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../script/novoCliente.js"></script>

</html>
