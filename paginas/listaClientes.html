<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Clientes - SCP</title>
    <link rel="stylesheet" href="../style/listaClientes.css">
</head>

<body>
    <a href="menu.html" class="botaoVoltar">Voltar</a>
    <div class="pageContent">
        <div class="categoryCard">
            <h1>Clientes Cadastrados</h1>

            <!-- Seção de Filtros para Pesquisa -->
            <div class="searchArea">
                <div class="filterGroup">
                    <label for="searchNome">Nome do Cliente</label>
                    <input type="text" id="searchNome" placeholder="Digite o nome...">
                </div>
                <div class="filterGroup">
                    <label for="searchTipo">Tipo</label>
                    <select id="searchTipo">
                        <option value="">Todos</option>
                        <option value="F">Pessoa Física (F)</option>
                        <option value="J">Pessoa Jurídica (J)</option>
                    </select>
                </div>
                <div class="filterGroup">
                    <label for="searchCpfCnpj">CPF/CNPJ</label>
                    <input type="text" id="searchCpfCnpj" placeholder="Ex: 000.000.000-00">
                </div>
                <button type="button" id="btnPesquisar">Pesquisar</button>
            </div>

            <table id="listaClientesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>CPF / CNPJ</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../script/listaClientes.js"></script>
</body>

</html>
