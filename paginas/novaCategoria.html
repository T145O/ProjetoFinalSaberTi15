<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP</title>
    <link rel="stylesheet" href="../style/novaCategoria.css">
</head>
<body>
    <a href="javascript:history.back()" class="botaoVoltar">Voltar</a>

    <main class="pageContent">
        <section class="categoryCard">
            <h1>Criar uma nova categoria</h1>
            <form id="novaCategoria" class="categoryForm">
                <div class="fieldGroup">
                    <label for="categoria">Descrição da categoria</label>
                    <input type="text" placeholder="Ex: Estofados/Informática" required id="categoria">
                </div>
                <button type="submit" id="enviar">Salvar</button>
            </form>
        </section>
    </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../script/novaCategoria.js"></script>
</html>
