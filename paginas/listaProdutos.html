<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Produtos - SCP</title>
    <link rel="stylesheet" href="../style/listaProdutos.css">
</head>
<body>
    <a href="menu.html" class="botaoVoltar">Voltar</a>
    <div class="pageContent">
        <div class="categoryCard">
            <h1>Produtos Cadastrados</h1>
            <div class="searchArea">
                <div class="filterGroup">
                    <label for="searchId">ID Produto</label>
                    <input type="number" id="searchId" placeholder="Ex: 1">
                </div>
                <div class="filterGroup">
                    <label for="searchCatId">ID Categoria</label>
                    <input type="number" id="searchCatId" placeholder="Ex: 2">
                </div>
                <div class="filterGroup">
                    <label for="searchNome">Nome do Produto</label>
                    <input type="text" id="searchNome" placeholder="Digite o nome...">
                </div>
                <div class="filterGroup">
                    <label for="searchValor">Valor Venda</label>
                    <input type="number" step="0.01" id="searchValor" placeholder="0.00">
                </div>
                <div class="filterGroup">
                    <label for="searchData">Data Cadastro</label>
                    <input type="date" id="searchData">
                </div>
                <div class="filterGroup">
                    <label for="searchStatus">Status</label>
                    <select id="searchStatus">
                        <option value="">Todos</option>
                        <option value="ATIVO">Ativo</option>
                        <option value="INATIVO">Inativo</option>
                    </select>
                </div>
                <button type="button" id="btnPesquisar">Pesquisar</button>
            </div>
            <table id="listaProdutosTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cat. ID</th>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../script/listaProdutos.js"></script>
</body>
</html>
