<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP</title>
    <link rel="stylesheet" href="../style/novoOrcamento.css">
</head>

<body>
    <a href="javascript:history.back()" class="botaoVoltar">Voltar</a>

    <main class="pageContent">
        <section class="categoryCard">
            <h1>Novo Orçamento</h1>
            <form id="novoOrcamentoForm" class="form">
                <div class="fieldGroup">
                    <label for="clienteSelect">Cliente:</label>
                    <select id="clienteSelect" required>
                        <option value="">Carregando clientes...</option>
                    </select>

                    <h2>Adicionar Itens</h2>
                    <div>
                        <div>
                            <label for="produtoSelect">Produto:</label>
                            <select id="produtoSelect">
                                <option value="">Carregando produtos...</option>
                            </select>
                        </div>
                        <div>
                            <label for="quantidadeInput">Quantidade:</label>
                            <input type="number" id="quantidadeInput" min="1" value="1">
                        </div>
                        <button type="button" id="adicionarItemBtn">Adicionar Item</button>
                    </div>
                    <h3>Itens do Orçamento</h3>
                    <table id="itensOrcamentoTable">
                        <thead>
                            <tr>
                                <th>Produto (ID)</th>
                                <th>Quantidade</th>
                                <th>Valor Unitário</th>
                                <th>Valor Total</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Itens serão adicionados aqui via JavaScript -->
                        </tbody>
                    </table>
                    <div class="total-display">
                        Valor Total do Orçamento: R$ <span id="valorTotalOrcamento">0.00</span>
                    </div>
                </div>
                <button type="submit">Gerar Orçamento</button>
            </form>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../script/novoOrcamento.js"></script>
</body>

</html>
