<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Orçamento - SCP</title>
    <link rel="stylesheet" href="../style/novoOrcamento.css">
    <style>
        .formGroup { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .formGroup label { font-weight: bold; color: #24445f; font-size: 0.9rem; }
        .btnSave { padding: 13px 20px; background-color: #1b67a8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: background 0.2s; }
        .btnSave:hover { background-color: #15598f; }
        .btnDelete { padding: 13px 20px; background-color: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: background 0.2s; }
        .btnDelete:hover { background-color: #a71d2a; }
        #codigoConfirmacao { background: #d1ecf1; padding: 4px 10px; border-radius: 4px; letter-spacing: 3px; font-family: monospace; font-size: 1.2rem; color: #0c5460; }
        .securitySection { background: #fdfdfe; border: 1px dashed #a9bfd3; padding: 15px; border-radius: 8px; margin-top: 20px; margin-bottom: 20px; }
        .remove-item-btn { background-color: #dc3545 !important; border-color: #dc3545 !important; }
    </style>
</head>
<body>
    <a href="listaOrcamentos.html" class="botaoVoltar">Voltar</a>

    <div class="pageContent">
        <div class="categoryCard">
            <h1>Editar Orçamento</h1>
            
            <form id="editarOrcamentoForm">
                <div class="fieldGroup" style="grid-template-columns: 1fr 1fr 1fr 1fr; display: grid; gap: 20px;">
                    <div>
                        <label for="orcamentoId">ID</label>
                        <input type="text" id="orcamentoId" readonly style="background-color: #e9ecef; cursor: not-allowed;">
                    </div>
                    <div style="grid-column: span 3;">
                        <label for="clienteSelect">Cliente</label>
                        <select id="clienteSelect" required></select>
                    </div>
                    <div style="grid-column: span 2;">
                        <label for="dataOrcamento">Data do Orçamento</label>
                        <input type="date" id="dataOrcamento" required>
                    </div>
                    <div style="grid-column: span 2;">
                        <label for="validadeOrcamento">Validade</label>
                        <input type="date" id="validadeOrcamento" required>
                    </div>
                </div>

                <h2>Itens do Orçamento</h2>
                <div class="fieldGroup" style="display: flex; align-items: flex-end; gap: 10px; margin-bottom: 20px;">
                    <div style="flex: 2;">
                        <label for="produtoSelect">Produto</label>
                        <select id="produtoSelect"></select>
                    </div>
                    <div style="flex: 1;">
                        <label for="quantidadeInput">Quantidade</label>
                        <input type="number" id="quantidadeInput" value="1" min="1">
                    </div>
                    <button type="button" id="adicionarItemBtn" style="height: 48px;">Adicionar</button>
                </div>

                <table id="itensOrcamentoTable">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Quantidade</th>
                            <th>Vl. Unitário</th>
                            <th>Vl. Total</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <div class="total-display">
                    Valor Total: R$ <span id="valorTotalOrcamento">0.00</span>
                </div>

                <div class="securitySection">
                    <p style="margin: 0 0 10px 0; font-weight: bold; color: #856404;">Confirmação de Segurança</p>
                    <p style="margin-bottom: 15px; font-size: 0.9rem;">
                        Para salvar ou excluir, digite o código: <span id="codigoConfirmacao"></span>
                    </p>
                    <input type="text" id="inputConfirmacao" placeholder="Digite os 5 caracteres" required 
                           style="width: 100%; padding: 12px; box-sizing: border-box;">
                </div>

                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <button type="submit" class="btnSave" style="flex: 1;">Salvar Alterações</button>
                    <button type="button" id="btnExcluir" class="btnDelete" style="flex: 1;">Excluir Orçamento</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../script/editarOrcamento.js"></script>
</body>
</html>
