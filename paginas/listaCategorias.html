<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Categorias - SCP</title>
    <link rel="stylesheet" href="../style/listaProdutos.css">
    <style>
        /* Estilo unificado para o Botão de Pesquisa e os Links de Edição */
        #btnPesquisar, 
        #listaCategoriasTable tbody td a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #1b67a8;
            color: white !important;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
        }

        #btnPesquisar:hover, 
        #listaCategoriasTable tbody td a:hover {
            background-color: #155184;
            transform: translateY(-1px);
        }

        #btnPesquisar:active, 
        #listaCategoriasTable tbody td a:active {
            transform: translateY(0);
        }

        /* Melhorias visuais na área de busca para consistência */
        .searchArea {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px;
            background-color: #f7fbff;
            border-radius: 8px;
            border: 1px solid #c4d6e8;
        }

        .filterGroup label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            color: #24445f;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <a href="menu.html" class="botaoVoltar">Voltar</a>
    <div class="pageContent">
        <div class="categoryCard">
            <h1>Categorias Cadastradas</h1>
            <div class="searchArea">
                <div class="filterGroup">
                    <label for="searchId">ID Categoria</label>
                    <input type="number" id="searchId" placeholder="Ex: 1">
                </div>
                <div class="filterGroup">
                    <label for="searchNome">Nome da Categoria</label>
                    <input type="text" id="searchNome" placeholder="Digite o nome...">
                </div>
                <button type="button" id="btnPesquisar">Pesquisar</button>
            </div>
            <table id="listaCategoriasTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descrição da Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../script/listaCategorias.js"></script>
</body>
</html>
