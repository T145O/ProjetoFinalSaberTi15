<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP</title>
    <link rel="stylesheet" href="../style/novoProduto.css">
</head>

<body>
    <a href="javascript:history.back()" class="botaoVoltar">Voltar</a>
    <main class="pageContent">
        <section class="categoryCard">
            <h1>Cadastrar um novo produto</h1>
            <form id="novoProdutoForm" class="form">
                <div class="fieldGroup">
                    <label for="categoriaProdutoId">Categoria do produto</label>
                    <select id="categoriaProdutoId" required>
                        <option value="">Carregando categorias...</option>
                    </select>

                    <label for="nome">Nome do novo produto</label>
                    <input type="text" placeholder="Nome" id="nome" name="nome" required>

                    <label for="descricao">Descricao do produto</label>
                    <textarea id="descricao" name="descricao" placeholder="Breve descricao" required></textarea>

                    <label for="val">Val. Unitario</label>
                    <input type="number" step="0.01" min="0" placeholder="R$0.00" id="val" name="val" required>

                    <label for="statusProduto">Status do produto</label>
                    <select id="statusProduto" required>
                        <option value="ATIVO">Ativo</option>
                        <option value="INATIVO">Inativo</option>
                    </select>
                    <button type="submit">Cadastrar</button>
                </div>
            </form>
        </section>
    </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../script/novoProduto.js"></script>

</html>
